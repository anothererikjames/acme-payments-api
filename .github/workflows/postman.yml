name: Postman CI
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
jobs:
  postman:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Postman Collection
        uses: postmanlabs/postman-cli-action@v1
        with:
          api-key: ${{ secrets.POSTMAN_API_KEY }}
          command: collection run 52238111-dc3285c5-a9ce-4400-9efa-9dcf780be35f --environment 52274286-aba5c321-ce68-48cc-a115-603474f8fada --verbose

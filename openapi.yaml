openapi: 3.0.0
info:
  title: Payments API
  description: Payment processing, refunds, and payment method management for the ACME platform.
  version: 3.0.1
servers:
  - url: https://payments.acme-platform.internal/v3
    description: Production
  - url: https://payments-dev.acme-platform.internal/v3
    description: Development
security:
  - bearerAuth: []
tags:
  - name: payments
  - name: refunds
  - name: methods
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service healthy
  /payments:
    get:
      tags: [payments]
      summary: List payments
      parameters:
        - name: customerId
          in: query
          schema: {type: string}
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, completed, failed, refunded]
      responses:
        '200':
          description: List of payments
    post:
      tags: [payments]
      summary: Process payment
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/PaymentInput'}
      responses:
        '201':
          description: Payment processed
        '402':
          description: Payment failed
  /payments/{paymentId}:
    get:
      tags: [payments]
      summary: Get payment by ID
      parameters:
        - name: paymentId
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Payment details
        '404':
          description: Not found
  /payments/{paymentId}/refund:
    post:
      tags: [refunds]
      summary: Refund payment
      parameters:
        - name: paymentId
          in: path
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount: {type: number}
                reason: {type: string}
      responses:
        '200':
          description: Refund issued
        '409':
          description: Already refunded
  /payment-methods:
    get:
      tags: [methods]
      summary: List saved payment methods
      parameters:
        - name: customerId
          in: query
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Payment methods
    post:
      tags: [methods]
      summary: Save payment method
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/PaymentMethodInput'}
      responses:
        '201':
          description: Method saved
  /payment-methods/{methodId}:
    delete:
      tags: [methods]
      summary: Remove payment method
      parameters:
        - name: methodId
          in: path
          required: true
          schema: {type: string}
      responses:
        '204':
          description: Removed
  /charges/validate:
    post:
      tags: [payments]
      summary: Validate charge before processing
      responses:
        '200':
          description: Validation result
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    PaymentInput:
      type: object
      required: [customerId, amount, currency, paymentMethodId]
      properties:
        customerId: {type: string}
        amount: {type: number}
        currency: {type: string}
        paymentMethodId: {type: string}
        orderId: {type: string}
    PaymentMethodInput:
      type: object
      required: [customerId, type, token]
      properties:
        customerId: {type: string}
        type:
          type: string
          enum: [card, bank_account, wallet]
        token: {type: string}
